specVersion: "4.0"
metadata:
  name: ui5_v2
type: application
framework:
  name: OpenUI5
  version: "1.142.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: ui5-v2-no-preload
      afterMiddleware: serveResources
---
specVersion: "4.0"
kind: extension
type: server-middleware
metadata:
  name: ui5-v2-no-preload
middleware:
  path: lib/no-preload-middleware.js
